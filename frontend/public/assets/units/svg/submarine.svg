<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill-opacity="0.85">
  <!-- Water surface -->
  <path d="M0,130 Q75,125 150,130 Q225,135 300,130" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <path d="M0,138 Q75,133 150,138 Q225,143 300,138" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  <!-- Hull -->
  <ellipse cx="150" cy="175" rx="110" ry="35" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Bow -->
  <ellipse cx="45" cy="175" rx="18" ry="28" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Conning tower -->
  <rect x="135" y="140" width="40" height="30" rx="5" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <rect x="140" y="132" width="30" height="12" rx="3" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Periscope -->
  <line x1="155" y1="132" x2="155" y2="110" stroke="#ffffff" stroke-width="2"/>
  <rect x="150" y="108" width="10" height="6" rx="2" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <!-- Periscope lens -->
  <circle cx="161" cy="111" r="3" fill="#ffffff" opacity="0.6"/>
  <!-- Diving planes -->
  <polygon points="55,170 55,180 30,185 30,165" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <polygon points="245,170 245,180 270,185 270,165" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <!-- Propeller -->
  <circle cx="260" cy="175" r="4" fill="#ffffff"/>
  <line x1="260" y1="160" x2="260" y2="190" stroke="#ffffff" stroke-width="2"/>
  <line x1="248" y1="168" x2="272" y2="182" stroke="#ffffff" stroke-width="2"/>
  <!-- Torpedo tubes -->
  <circle cx="42" cy="168" r="3" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <circle cx="42" cy="178" r="3" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <!-- Bubbles -->
  <circle cx="130" cy="125" r="4" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
  <circle cx="140" cy="118" r="3" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.25"/>
  <circle cx="125" cy="115" r="2" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
</svg>