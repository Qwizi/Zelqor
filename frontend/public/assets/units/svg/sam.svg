<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill-opacity="0.85">
  <!-- Vehicle body -->
  <rect x="55" y="185" width="190" height="50" rx="8" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Wheels -->
  <circle cx="90" cy="240" r="16" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <circle cx="150" cy="240" r="16" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <circle cx="210" cy="240" r="16" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <circle cx="90" cy="240" r="7" fill="#ffffff"/>
  <circle cx="150" cy="240" r="7" fill="#ffffff"/>
  <circle cx="210" cy="240" r="7" fill="#ffffff"/>
  <!-- Launcher platform -->
  <rect x="100" y="160" width="100" height="30" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Missile tubes (4-pack) -->
  <g transform="rotate(-35, 150, 160)">
    <rect x="105" y="130" width="18" height="55" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="128" y="130" width="18" height="55" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="151" y="130" width="18" height="55" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="174" y="130" width="18" height="55" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Missile tips -->
    <polygon points="114,130 114,118 110,118 114,108 118,118 114,118" fill="#ffffff" opacity="0.8"/>
    <polygon points="137,130 137,118 133,118 137,108 141,118 137,118" fill="#ffffff" opacity="0.8"/>
    <polygon points="160,130 160,118 156,118 160,108 164,118 160,118" fill="#ffffff" opacity="0.8"/>
    <polygon points="183,130 183,118 179,118 183,108 187,118 183,118" fill="#ffffff" opacity="0.8"/>
  </g>
  <!-- Radar dish -->
  <line x1="85" y1="185" x2="85" y2="140" stroke="#ffffff" stroke-width="2"/>
  <path d="M70,145 Q85,130 100,145" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>
  <circle cx="85" cy="140" r="3" fill="#ffffff" opacity="0.7"/>
  <!-- Radar waves -->
  <path d="M65,140 Q85,120 105,140" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
  <path d="M58,138 Q85,112 112,138" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.15"/>
</svg>