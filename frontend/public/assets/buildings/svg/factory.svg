<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill-opacity="0.85">
  <!-- Base -->
  <rect x="30" y="240" width="240" height="15" rx="3" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Main building -->
  <rect x="40" y="155" width="180" height="87" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Sawtooth roof -->
  <polygon points="40,155 100,155 100,120 40,155" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="100,155 160,155 160,120 100,155" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="160,155 220,155 220,120 160,155" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Roof windows -->
  <polygon points="55,150 95,150 95,128" fill="#ffffff" opacity="0.4" stroke="#ffffff" stroke-width="0.8"/>
  <polygon points="115,150 155,150 155,128" fill="#ffffff" opacity="0.4" stroke="#ffffff" stroke-width="0.8"/>
  <polygon points="175,150 215,150 215,128" fill="#ffffff" opacity="0.4" stroke="#ffffff" stroke-width="0.8"/>
  <!-- Factory windows -->
  <rect x="55" y="175" width="18" height="20" rx="2" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <rect x="85" y="175" width="18" height="20" rx="2" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <rect x="155" y="175" width="18" height="20" rx="2" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <rect x="185" y="175" width="18" height="20" rx="2" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <!-- Large door -->
  <rect x="115" y="200" width="30" height="42" rx="3" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Smokestacks -->
  <rect x="230" y="100" width="18" height="142" rx="3" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <rect x="255" y="120" width="14" height="122" rx="3" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Smoke -->
  <circle cx="239" cy="90" r="8" fill="#ffffff" opacity="0.2"/>
  <circle cx="244" cy="78" r="10" fill="#ffffff" opacity="0.15"/>
  <circle cx="240" cy="64" r="12" fill="#ffffff" opacity="0.1"/>
  <circle cx="262" cy="112" r="6" fill="#ffffff" opacity="0.15"/>
  <circle cx="266" cy="100" r="8" fill="#ffffff" opacity="0.1"/>
  <!-- Gear emblem -->
  <circle cx="130" cy="215" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="130" cy="215" r="3" fill="#ffffff" opacity="0.3"/>
</svg>