<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill-opacity="0.85">
  <!-- Base -->
  <rect x="100" y="240" width="100" height="15" rx="3" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Tower body -->
  <polygon points="120,240 180,240 170,100 130,100" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Tower levels -->
  <line x1="122" y1="200" x2="178" y2="200" stroke="#ffffff" stroke-width="1"/>
  <line x1="124" y1="165" x2="176" y2="165" stroke="#ffffff" stroke-width="1"/>
  <line x1="127" y1="135" x2="173" y2="135" stroke="#ffffff" stroke-width="1"/>
  <!-- Observation platform -->
  <rect x="115" y="95" width="70" height="12" rx="3" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Observation windows -->
  <rect x="125" y="97" width="12" height="7" rx="1" fill="#ffffff" opacity="0.3" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="144" y="97" width="12" height="7" rx="1" fill="#ffffff" opacity="0.3" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="163" y="97" width="12" height="7" rx="1" fill="#ffffff" opacity="0.3" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Roof -->
  <polygon points="120,95 180,95 160,75 140,75" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Searchlight -->
  <circle cx="150" cy="78" r="5" fill="#ffffff" opacity="0.5" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Searchlight beam (cone) -->
  <polygon points="148,73 100,30 200,30 152,73" fill="#ffffff" opacity="0.06"/>
  <!-- Antenna -->
  <line x1="150" y1="75" x2="150" y2="55" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="150" cy="53" r="2.5" fill="#ffffff" opacity="0.6"/>
  <!-- Sandbag wall -->
  <ellipse cx="105" cy="242" rx="15" ry="5" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <ellipse cx="105" cy="237" rx="12" ry="4" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <ellipse cx="195" cy="242" rx="15" ry="5" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <ellipse cx="195" cy="237" rx="12" ry="4" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <!-- Ladder -->
  <line x1="165" y1="240" x2="168" y2="105" stroke="#ffffff" stroke-width="1"/>
  <line x1="172" y1="240" x2="175" y2="105" stroke="#ffffff" stroke-width="1"/>
</svg>