<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill-opacity="0.85">
  <!-- Runway -->
  <rect x="20" y="230" width="260" height="30" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="40" y1="245" x2="260" y2="245" stroke="#ffffff" stroke-width="2" stroke-dasharray="15 10" opacity="0.6"/>
  <!-- Hangar -->
  <path d="M60,230 L60,140 Q150,100 240,140 L240,230" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Hangar door -->
  <rect x="100" y="180" width="100" height="50" rx="3" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="150" y1="180" x2="150" y2="230" stroke="#ffffff" stroke-width="1"/>
  <!-- Control tower -->
  <rect x="245" y="140" width="30" height="90" rx="3" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <rect x="242" y="130" width="36" height="15" rx="3" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Tower windows -->
  <rect x="246" y="133" width="28" height="8" rx="2" fill="#22d3ee" opacity="0.35" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Tower antenna -->
  <line x1="260" y1="130" x2="260" y2="105" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="260" cy="103" r="3" fill="#ffffff" opacity="0.6"/>
  <!-- Radar dish on tower -->
  <path d="M252,115 Q260,108 268,115" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <!-- Windsock -->
  <line x1="50" y1="230" x2="50" y2="200" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="50,200 70,205 50,210" fill="#ffffff" opacity="0.5" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Parked plane silhouette -->
  <polygon points="130,210 120,220 140,220 150,210 140,220 160,220 170,210" fill="#ffffff" opacity="0.4"/>
</svg>