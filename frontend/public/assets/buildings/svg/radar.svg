<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill-opacity="0.85">
  <!-- Base -->
  <rect x="60" y="230" width="180" height="20" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Building -->
  <rect x="90" y="170" width="120" height="62" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Building windows -->
  <rect x="105" y="185" width="25" height="15" rx="2" fill="#ffffff" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="170" y="185" width="25" height="15" rx="2" fill="#ffffff" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Screen glow in windows -->
  <rect x="108" y="188" width="19" height="9" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="173" y="188" width="19" height="9" rx="1" fill="#ffffff" opacity="0.15"/>
  <!-- Tower/mast -->
  <rect x="145" y="90" width="10" height="82" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Radar dish -->
  <ellipse cx="150" cy="80" rx="55" ry="15" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.7" transform="rotate(-15, 150, 80)"/>
  <ellipse cx="150" cy="80" rx="40" ry="10" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5" transform="rotate(-15, 150, 80)"/>
  <ellipse cx="150" cy="80" rx="25" ry="6" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3" transform="rotate(-15, 150, 80)"/>
  <!-- Center feed -->
  <circle cx="150" cy="80" r="5" fill="#ffffff" opacity="0.6"/>
  <!-- Radar waves -->
  <circle cx="150" cy="80" r="70" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <circle cx="150" cy="80" r="90" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.08"/>
  <circle cx="150" cy="80" r="110" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.04"/>
  <!-- Scan glow -->
  <ellipse cx="150" cy="80" rx="65" ry="65" fill="#ffffff"/>
  <!-- Door -->
  <rect x="140" y="210" width="20" height="22" rx="2" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <!-- Antenna array on roof -->
  <line x1="100" y1="170" x2="95" y2="150" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="200" y1="170" x2="205" y2="150" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="95" cy="148" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="205" cy="148" r="2.5" fill="#ffffff" opacity="0.5"/>
</svg>