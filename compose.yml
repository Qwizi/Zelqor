services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-zelqor}
      POSTGRES_USER: ${DB_USER:-zelqor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zelqor}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zelqor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6380:6379"
    volumes:
      - redis_data_dev:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
    volumes:
      - .:/app
      - backend_venv:/app/.venv
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash scripts/docker_init.sh uv run python manage.py runserver 0.0.0.0:8000

  celery:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DEBUG: "True"
    volumes:
      - .:/app
      - backend_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A config worker -l info --concurrency=2

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DEBUG: "True"
    volumes:
      - .:/app
      - backend_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A config beat -l info

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_GAME_DB: "1"
      DJANGO_INTERNAL_URL: http://backend:8000
      GATEWAY_PORT: "8080"
      RUST_LOG: info,zelqor_gateway=debug
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: devsecret-zelqor-at-least-32-chars-long
      LIVEKIT_PUBLIC_URL: ws://localhost:7880
    volumes:
      - ./gateway:/app
      - gateway_target:/app/target
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  gamenode:
    build:
      context: ./gateway
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_GAME_DB: "1"
      GATEWAY_URL: http://gateway:8080
      DJANGO_INTERNAL_URL: http://backend:8000
      CLIENT_ID: ${GAMENODE_CLIENT_ID:-official-gamenode}
      CLIENT_SECRET: ${GAMENODE_CLIENT_SECRET:-dev-gamenode-secret}
      SERVER_NAME: "Official Server"
      REGION: eu-west
      MAX_MATCHES: "100"
      RUST_LOG: info,zelqor_gamenode=debug
    volumes:
      - ./gateway:/app
      - gateway_target:/app/target
    depends_on:
      redis:
        condition: service_healthy
      gateway:
        condition: service_started
      backend:
        condition: service_started
    command: cargo-watch -x 'run --bin zelqor-gamenode' -w crates

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      API_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost/ws
      NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7880
      INSECURE_COOKIES: "true"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      - backend

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: devsecret-zelqor-at-least-32-chars-long"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./staticfiles:/srv/static:ro
      - ./media:/srv/media:ro
    depends_on:
      - backend
      - frontend
      - gateway
      - livekit

volumes:
  postgres_data_dev:
  redis_data_dev:
  backend_venv:
  frontend_modules:
  gateway_target:
