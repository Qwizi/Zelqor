services:
  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-maplord}
      POSTGRES_USER: ${DB_USER:-maplord}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-maplord}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/qwizi/maplord:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DEBUG: "False"
      ALLOWED_HOSTS: ${DOMAIN:-localhost},backend
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    image: ghcr.io/qwizi/maplord:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A config worker -l info

  celery-beat:
    image: ghcr.io/qwizi/maplord:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DEBUG: "False"
    volumes:
      - celerybeat_data:/app/celerybeat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A config beat -l info --schedule /app/celerybeat/celerybeat-schedule

  frontend:
    image: ghcr.io/qwizi/maplord-frontend:${TAG:-latest}
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000/api/v1
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
  celerybeat_data:
  caddy_data:
  caddy_config:
