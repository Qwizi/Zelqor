services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Tuned for low-RAM ARM (Pi 4 / 4GB)
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c effective_cache_size=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=4MB
    environment:
      POSTGRES_DB: ${DB_NAME:-maplord}
      POSTGRES_USER: ${DB_USER:-maplord}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-maplord}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Disable RDB/AOF persistence — eliminates SD card I/O on every write
    # Set maxmemory with noeviction (game state must not be evicted)
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy noeviction --tcp-keepalive 60
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/qwizi/maplord:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      # Docker-internal hostnames — must override .env
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health/\")'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  gateway:
    image: ghcr.io/qwizi/maplord-gateway:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      # Docker-internal hostnames — must override .env
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DJANGO_INTERNAL_URL: http://backend:8000
      GATEWAY_PORT: "8080"
      LIVEKIT_URL: ws://livekit:7880
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  celery:
    image: ghcr.io/qwizi/maplord:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      # Docker-internal hostnames — must override .env
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    mem_limit: 192m
    depends_on:
      backend:
        condition: service_healthy
    command: uv run celery -A config worker -l warning --pool=gevent --concurrency 8

  celery-beat:
    image: ghcr.io/qwizi/maplord:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      # Docker-internal hostnames — must override .env
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - celerybeat_data:/app/celerybeat
    depends_on:
      backend:
        condition: service_healthy
    command: uv run celery -A config beat -l info --schedule /app/celerybeat/celerybeat-schedule

  frontend:
    image: ghcr.io/qwizi/maplord-frontend:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      API_URL: http://backend:8000/api/v1
      NODE_OPTIONS: --max-old-space-size=256
    mem_limit: 350m
    depends_on:
      - backend

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}"
      UDP_PORT: "7882-7892"
      NODE_IP: ""
    command: --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7882-7892:7882-7892/udp"
    mem_limit: 256m

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
      - gateway
      - livekit

volumes:
  postgres_data:
  static_data:
  media_data:
  celerybeat_data:
  caddy_data:
  caddy_config:
