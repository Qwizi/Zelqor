name: Release and Publish GHCR

on:
  push:
    branches:
      - main
      - master
    paths:
      - apps/**
      - config/**
      - frontend/**
      - gateway/**
      - Dockerfile
      - frontend/Dockerfile
      - gateway/Dockerfile
      - pyproject.toml
      - uv.lock
      - manage.py
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Detect what changed ──────────────────────────────────────────
  changes:
    name: Detect changed paths
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/**'
              - 'config/**'
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'manage.py'
            frontend:
              - 'frontend/**'
            gateway:
              - 'gateway/**'

  # ── Version & release ────────────────────────────────────────────
  release:
    name: CalVer tag and GitHub release
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Compute and set CalVer in pyproject.toml
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          OLD_VERSION="$(uv version --short)"
          YEAR="$(date -u +%Y)"
          MONTH="$((10#$(date -u +%m)))"
          DAY="$((10#$(date -u +%d)))"
          CALVER_PREFIX="${YEAR}.${MONTH}.${DAY}"

          NEXT_BUILD=1
          while read -r TAG_LINE; do
            BUILD="${TAG_LINE#v${CALVER_PREFIX}.}"
            if [[ "${BUILD}" =~ ^[0-9]+$ ]] && (( BUILD >= NEXT_BUILD )); then
              NEXT_BUILD=$((BUILD + 1))
            fi
          done < <(git tag --list "v${CALVER_PREFIX}.*")

          NEW_VERSION="${CALVER_PREFIX}.${NEXT_BUILD}"
          uv version "${NEW_VERSION}" --frozen

          TAG="v${NEW_VERSION}"

          echo "old_version=${OLD_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "version=${NEW_VERSION}"     >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}"                 >> "${GITHUB_OUTPUT}"

      - name: Commit version bump and push
        shell: bash
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml
          if git diff --cached --quiet; then
            echo "No version changes detected"
          else
            git commit -m "release: bump version to ${{ steps.version.outputs.tag }} [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
          else
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Backend image ────────────────────────────────────────────────
  build-backend:
    name: Build and push backend image
    needs: [changes, release]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=${{ needs.release.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  # ── Frontend image ───────────────────────────────────────────────
  build-frontend:
    name: Build and push frontend image
    needs: [changes, release]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-frontend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=${{ needs.release.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_WS_URL=
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── Gateway image ───────────────────────────────────────────────
  build-gateway:
    name: Build and push gateway image
    needs: [changes, release]
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-gateway
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=${{ needs.release.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          file: ./gateway/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max
